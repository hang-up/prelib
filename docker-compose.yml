services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - frontend
      - api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - prelib_network

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    volumes:
      - ./db/data:/data
      - ./db/adminer/sqlite-no-credentials.php:/var/www/html/plugins/sqlite-no-credentials.php:ro
    networks:
      - prelib_network

  api:
    build:
      context: ./backend
    command: npm run dev
    environment:
      HOST: 0.0.0.0
      PORT: 4200
      APP_ORIGIN: http://prelib.localhost
      # Defaults to true so reviewers can use http://localhost without editing /etc/hosts.
      # Set DISABLE_CORS=false once APP_ORIGIN resolves locally.
      DISABLE_CORS: "${DISABLE_CORS:-true}"
      DATABASE_PATH: /data/task-tracker.sqlite
      AUTH_COOKIE_NAME: task_tracker_session
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "4200:4200"
    volumes:
      # - ./backend:/app
      # - backend_node_modules:/app/node_modules
      - ./db/data:/data
    networks:
      - prelib_network

  frontend:
    build:
      context: ./frontend
      target: development-stage
    command: npm run dev
    environment:
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 6384
      VITE_APP_TITLE: Prelib Task Tracker
      VITE_API_BASE_URL: /api
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    ports:
      - "6384:6384"
    # volumes:
    # - ./frontend:/app
    # - frontend_node_modules:/app/node_modules
    networks:
      - prelib_network

networks:
  prelib_network:
    driver: bridge

# Only needd for active development.
